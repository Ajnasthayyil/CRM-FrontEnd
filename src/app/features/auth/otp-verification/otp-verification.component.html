<app-theme-toggle></app-theme-toggle>
<div class="otp-container">
  <div class="otp-card">
    
    <div class="otp-header">
      <div class="shield-box">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
      </div>
      <h2>Two-Factor Authentication</h2>
      <p>Enter the 6-digit code sent to your registered mobile number</p>
      <div class="phone-number">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
          <line x1="12" y1="18" x2="12.01" y2="18"></line>
        </svg>
        <span>+91 xxxx xx 3210</span>
      </div>
    </div>

    <div class="otp-inputs">
      <input *ngFor="let digit of otpCode; let i = index" 
             type="text" 
             maxlength="1" 
             [(ngModel)]="otpCode[i]" 
             (input)="onInput($event, i)"
             (keydown)="onKeyDown($event, i)"
             #otpInput>
    </div>

    <button class="btn-primary" (click)="verify()">Verify & Continue</button>

    <div class="resend-section">
      <p>Resend OTP in <strong>26s</strong></p>
    </div>

    <div class="back-link">
      <a routerLink="/login" [queryParams]="{ role: selectedRole }">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to login
      </a>
    </div>

  </div>
</div>
